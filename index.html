<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#6366f1;--s:#ec4899;--a:#14b8a6;--d:#0f172a;--dl:#1e293b;--g:#64748b;--gl:#94a3b8;--w:#fff;--ok:#22c55e;--warn:#f59e0b;--err:#ef4444}
body{font-family:'Inter',sans-serif;background:var(--d);color:var(--w);min-height:100vh}
header{position:sticky;top:0;z-index:100;padding:1rem;background:rgba(15,23,42,.95);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.1)}
nav{max-width:1400px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem}
.logo{display:flex;align-items:center;gap:.5rem;font-size:1.4rem;font-weight:800}
.logo i{background:linear-gradient(135deg,var(--p),var(--s));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo span{background:linear-gradient(135deg,var(--p),var(--s));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.search-box{display:flex;flex:1;max-width:500px;background:var(--dl);border-radius:12px;border:1px solid rgba(255,255,255,.1);overflow:hidden}
.search-box input{flex:1;padding:.75rem 1rem;background:0;border:0;color:var(--w);font-size:.9rem;outline:0}
.search-box input::placeholder{color:var(--g)}
.search-box button{padding:.75rem 1.25rem;background:linear-gradient(135deg,var(--p),var(--s));border:0;color:var(--w);cursor:pointer}
.cats{display:flex;gap:.5rem;padding:1rem;max-width:1400px;margin:0 auto;flex-wrap:wrap}
.cat{padding:.5rem 1rem;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:50px;color:var(--gl);font-size:.8rem;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:.4rem}
.cat:hover,.cat.on{background:linear-gradient(135deg,var(--p),var(--s));border-color:transparent;color:var(--w)}
.brands{padding:0 1rem;max-width:1400px;margin:0 auto 1rem}
.brands-title{font-size:.9rem;color:var(--gl);margin-bottom:.75rem}
.brands-list{display:flex;gap:.75rem;overflow-x:auto;padding-bottom:.5rem}
.brand{min-width:80px;padding:.75rem;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;text-align:center;cursor:pointer;transition:.2s}
.brand:hover,.brand.on{background:rgba(99,102,241,.15);border-color:var(--p)}
.brand img{width:32px;height:32px;object-fit:contain;margin-bottom:.25rem}
.brand span{font-size:.7rem;display:block;color:var(--gl)}
main{max-width:1400px;margin:0 auto;padding:0 1rem 100px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem}
.card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:14px;overflow:hidden;cursor:pointer;transition:.2s;position:relative}
.card:hover{transform:translateY(-3px);border-color:rgba(99,102,241,.4)}
.card.sel{border:2px solid var(--p);background:rgba(99,102,241,.1)}
.card.sel::after{content:'✓';position:absolute;top:8px;right:8px;width:22px;height:22px;background:var(--p);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem}
.card-img{height:120px;background:linear-gradient(135deg,rgba(255,255,255,.05),rgba(255,255,255,.02));display:flex;align-items:center;justify-content:center;padding:.75rem}
.card-img img{max-height:100%;max-width:100%;object-fit:contain}
.card-body{padding:.75rem}
.card-brand{font-size:.65rem;color:var(--p);text-transform:uppercase;letter-spacing:.5px}
.card-name{font-size:.85rem;font-weight:600;margin:.25rem 0;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;height:2.2em}
.card-price{font-size:1rem;font-weight:700;color:var(--a)}
.card-rating{font-size:.75rem;color:var(--warn);margin-top:.25rem}
.card-rating span{color:var(--g)}
.bar{position:fixed;bottom:0;left:0;right:0;background:var(--dl);border-top:1px solid rgba(255,255,255,.1);padding:1rem;display:none;z-index:100}
.bar.show{display:block}
.bar-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.bar-items{display:flex;gap:.5rem;flex-wrap:wrap}
.bar-item{display:flex;align-items:center;gap:.4rem;padding:.4rem .6rem;background:rgba(255,255,255,.05);border-radius:8px;font-size:.8rem}
.bar-item img{width:24px;height:24px;object-fit:contain}
.bar-item .x{cursor:pointer;color:var(--err);margin-left:.25rem}
.bar-btn{padding:.75rem 1.5rem;background:linear-gradient(135deg,var(--p),var(--s));border:0;border-radius:10px;color:var(--w);font-weight:600;cursor:pointer;display:flex;align-items:center;gap:.5rem}
.bar-btn:disabled{opacity:.5;cursor:not-allowed}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;overflow-y:auto;padding:1rem}
.overlay.show{display:block}
.modal{max-width:1100px;margin:0 auto;background:var(--dl);border-radius:20px;overflow:hidden}
.modal-head{padding:1.25rem;background:rgba(99,102,241,.1);display:flex;justify-content:space-between;align-items:center}
.modal-head h2{font-size:1.2rem;display:flex;align-items:center;gap:.5rem}
.modal-close{width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,.1);border:0;color:var(--w);cursor:pointer;font-size:1rem}
.modal-body{padding:1.5rem}
.ai-box{background:linear-gradient(135deg,rgba(99,102,241,.1),rgba(236,72,153,.1));border:1px solid rgba(99,102,241,.2);border-radius:14px;padding:1.25rem;margin-bottom:1.5rem}
.ai-head{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem}
.ai-ico{width:36px;height:36px;background:linear-gradient(135deg,var(--p),var(--s));border-radius:8px;display:flex;align-items:center;justify-content:center}
.ai-title{font-weight:700;font-size:.95rem}
.ai-body{font-size:.85rem;line-height:1.7;color:var(--gl)}
.ai-body p{margin-bottom:.75rem}
.ai-body strong{color:var(--w)}
.badge{display:inline-flex;align-items:center;gap:.4rem;padding:.4rem .75rem;background:rgba(34,197,94,.2);border:1px solid var(--ok);border-radius:50px;color:var(--ok);font-weight:600;font-size:.8rem;margin-top:.5rem}
.tbl-wrap{overflow-x:auto;margin-bottom:1.5rem}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th,td{padding:.75rem;text-align:left;border-bottom:1px solid rgba(255,255,255,.05)}
th{background:rgba(99,102,241,.1);color:#818cf8;font-weight:600}
th:first-child{width:130px}
.win{background:rgba(34,197,94,.1);color:var(--ok);font-weight:600}
.col-head{display:flex;flex-direction:column;align-items:center;gap:.3rem}
.col-head img{width:50px;height:50px;object-fit:contain}
.col-head span{font-size:.75rem;text-align:center}
.pc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1rem;margin-bottom:1.5rem}
.pc-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:1rem}
.pc-card h4{display:flex;align-items:center;gap:.4rem;font-size:.85rem;margin-bottom:.75rem}
.pc-card h4 img{width:26px;height:26px;object-fit:contain}
.pc-list{list-style:none;font-size:.8rem;color:var(--gl)}
.pc-list li{padding:.3rem 0;display:flex;align-items:flex-start;gap:.4rem}
.pc-list.pro li::before{content:'✓';color:var(--ok)}
.pc-list.con li::before{content:'✗';color:var(--err)}
.verdict{background:linear-gradient(135deg,rgba(34,197,94,.1),rgba(20,184,166,.1));border:1px solid rgba(34,197,94,.3);border-radius:14px;padding:1.5rem;text-align:center}
.verdict h3{font-size:1rem;margin-bottom:.75rem}
.verdict-name{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,var(--p),var(--s));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.5rem}
.verdict p{font-size:.85rem;color:var(--gl);max-width:550px;margin:0 auto}
.chart-box{background:rgba(255,255,255,.03);border-radius:14px;padding:1rem;margin-bottom:1.5rem}
.chart-box h4{font-size:.9rem;margin-bottom:.75rem}
.loading{display:none;position:fixed;inset:0;background:rgba(15,23,42,.95);z-index:300;align-items:center;justify-content:center;flex-direction:column;gap:1rem}
.loading.show{display:flex}
.spinner{width:50px;height:50px;border:3px solid rgba(99,102,241,.2);border-top-color:var(--p);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:var(--gl);font-size:.9rem}
@media(max-width:600px){.grid{grid-template-columns:repeat(2,1fr)}.card-img{height:100px}.search-box{max-width:100%;order:3;width:100%}}
</style>
</head>

<li>${p.r>=4.7?'Exceptional':p.r>=4.5?'Excellent':'Good'} user ratings (${p.r}/5)</li>
<li>Strong ${sp[0].toLowerCase()}: ${p.s[sp[0]]}</li>
<li>${p.b} quality & warranty</li>
<li>${p===bv?'Best value in comparison':p===ch?'Most affordable option':'Premium build quality'}</li>
</ul>
<ul class="pc-list con">
<li>${p.p>1500?'Premium pricing':p.p>800?'Mid-range price':'May lack some premium features'}</li>
<li>${p.b} ecosystem lock-in</li>
</ul>
</div>`).join('')}
</div>
<div class="chart-box"><h4><i class="fas fa-chart-bar"></i> Rating & Value Analysis</h4><canvas id="chart" height="180"></canvas></div>
<div class="verdict">
<h3><i class="fas fa-trophy"></i> Compfu AI Recommendation</h3>
<div class="verdict-name">${w.n}</div>
<p>Based on analysis of ${tr.toLocaleString()} reviews and comprehensive specifications, the <strong>${w.n}</strong> delivers the best overall experience with ${w.r}/5 user satisfaction. For budget-conscious buyers, the <strong>${bv.n}</strong> at $${bv.p.toLocaleString()} offers excellent value.</p>
</div>`;
document.getElementById('overlay').classList.add('show');
setTimeout(()=>{new Chart(document.getElementById('chart'),{type:'bar',data:{labels:ps.map(p=>p.n.split(' ').slice(0,2).join(' ')),datasets:[{label:'Rating',data:ps.map(p=>p.r),backgroundColor:'rgba(99,102,241,.8)'},{label:'Value Score',data:ps.map(p=>(p.r/p.p*1000).toFixed(1)),backgroundColor:'rgba(236,72,153,.8)'}]},options:{responsive:true,plugins:{legend:{labels:{color:'#94a3b8'}}},scales:{y:{grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#94a3b8'}},x:{grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#94a3b8',font:{size:10}}}}}})},100)}
function closeModal(){document.getElementById('overlay').classList.remove('show')}
init();
</script>
</body>
</html>
